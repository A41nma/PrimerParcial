<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimerParcial</title>
</head>
<body>
    <div class ="carta"></div>
    <div class="icono"></div>
</body>
</html>
<style>
    .carta{
        width: 300px;
        height: 152px;
        background-color: #303030;
        border-radius: 12px;
        padding: 28px;
        gap: 12px;
        position:absolute;
        top: 50%;
    }
    .carta::before{
        content: "20 Mensajes";
        color: #FFFFFF;
        font-size: 30px;
        position: absolute;
        top: 30%;
        left: 30%;
        transform: translate(-50%, -50%);
    }
    .carta::content{
        content: "4.46% ";
        color: #27AE60;
        font-size: 12px;
        position: absolute;
        top: 60%;
        left: 10%;
    }
    .carta::after{
        content:"desde el ultimo mes";
        color: #FFFFFF;
        font-size: 12px;
        position: absolute;
        top: 60%;
        left: 10%;

    }
    .icono{
        width: 64px;
        height: 64px;
        background-color: #F2994A;
        border-radius: 50%;
        padding: 11px;
        gap: 10px;
        position: absolute;
        top: 54%;
        left: 250px;

    }
    .icono::before{
        width: 30px;
        height: 30px;
        color: #F2994A;
        position: absolute;
        top: 54%;
        left: 25px;
    }
</style>
